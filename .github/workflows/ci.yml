name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.62
          actions-cache-key: emsdk-cache-${{ runner.os }}

      - name: Configure CMake project
        run: emcmake cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly target
        run: cmake --build build --parallel

      - name: Sanity check build outputs
        run: |
          test -f build/satpath.js
          test -f build/satpath.wasm

      - name: Create release archive
        run: |
          mkdir -p dist
          cp build/satpath.js build/satpath.wasm dist/
          ARCHIVE_BASENAME="satpath-${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "release" ]; then
            ARCHIVE_BASENAME="satpath-${{ github.ref_name }}"
          fi
          zip -j "dist/${ARCHIVE_BASENAME}.zip" dist/satpath.js dist/satpath.wasm
          echo "ARCHIVE_NAME=${ARCHIVE_BASENAME}" >> "$GITHUB_ENV"
          echo "ARCHIVE_PATH=dist/${ARCHIVE_BASENAME}.zip" >> "$GITHUB_ENV"

      - name: Upload archive artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_PATH }}

      - name: Attach archive to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARCHIVE_PATH }}
